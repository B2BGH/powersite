<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>PowerSite | Build Powerful Experiences</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{

            background:#111;
            color:white;

        }

        header{

            display:flex;
            justify-content:space-between;
            align-items:center;

            padding:25px 70px;

        }

        .logo{

            font-size:30px;
            font-weight:bold;

            color:#00d9ff;

        }

        nav a{

            color:white;
            text-decoration:none;
            margin-left:30px;

        }

        .hero{

            height:85vh;

            display:flex;

            flex-direction:column;

            justify-content:center;

            align-items:center;

            text-align:center;

            padding:20px;

        }

        h1{

            font-size:60px;
            margin-bottom:20px;

        }

        p{

            font-size:22px;

            max-width:700px;

            color:#cfcfcf;

        }

        button{

            margin-top:40px;

            padding:15px 35px;

            border:none;

            border-radius:50px;

            font-size:18px;

            background:#00d9ff;

            cursor:pointer;

        }

        button:hover{

            transform:scale(1.05);

        }

    </style>

</head>

<body>

<header>

<div class="logo">

PowerSite

</div>

<nav>

<a href="#">Home</a>

<a href="#">Portfolio</a>

<a href="#">Services</a>

<a href="#">Contact</a>

</nav>

</header>

<section class="hero">

<h1>Build Powerful Experiences</h1>

<p>

Welcome to PowerSite.

We design modern websites that combine speed,
simplicity, elegant design and smart interaction.

</p>

<button>

Explore Our Work

</button>

</section>

</body>

</html>
